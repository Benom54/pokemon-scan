function withExt(url) {
  if (!url) return url;

function getParam(name) { return new URLSearchParams(window.location.search).get(name); }

function burst(el) {
  const colors = ['#e8c583', '#c9a15a', '#ffffff', '#4fa47d'];
  for (let i = 0; i < 12; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    const angle = (Math.PI * 2 * i) / 12;
    const dist = 26 + Math.random() * 18;
    s.style.background = colors[i % colors.length];
    s.style.left = '50%';
    s.style.top = '50%';
    el.appendChild(s);
    s.animate([
      { transform: 'translate(-50%,-50%) scale(1)', opacity: 1 },
      { transform: `translate(${Math.cos(angle)*dist - 2.5}px, ${Math.sin(angle)*dist - 2.5}px) scale(0)`, opacity: 0 }
    ], { duration: 550 + Math.random()*250, easing: 'ease-out' });
    setTimeout(() => s.remove(), 850);
  }
}

function rarityIcon(rarity) {
  const r = (rarity || '').toLowerCase();
  if (r.includes('rare') || r.includes('holo') || r.includes('secret') || r.includes('ultra') || r.includes('full art')) {
    return '<svg class="rarity-icon" viewBox="0 0 24 24"><path d="M12 2l2.9 6.9 7.1.6-5.4 4.7 1.7 7-6.3-3.9-6.3 3.9 1.7-7L2 9.5l7.1-.6z" fill="#e8c583"/></svg>';
  }
  if (r.includes('uncommon') || r.includes('peu commune')) {
    return '<svg class="rarity-icon" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" fill="#4fa47d" transform="rotate(45 12 12)"/></svg>';
  }
  if (r.includes('common') || r.includes('commune')) {
    return '<svg class="rarity-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="#8891a1"/></svg>';
  }
  return '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

let siteSettings = {};

async function loadSiteSettings() {
  try {
    const resp = await fetch(`${SUPABASE_URL}/rest/v1/settings?select=key,value`, {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
    });
    if (!resp.ok) return;
    const rows = await resp.json();
    rows.forEach(r => { siteSettings[r.key] = r.value; });

    if (siteSettings.breadcrumb_text) {
      document.querySelector('.breadcrumb a').textContent = siteSettings.breadcrumb_text;
    }
  } catch (err) {}
}

async function loadBlocks() {
  try {
    const resp = await fetch(`${SUPABASE_URL}/rest/v1/cartes?select=series_id,series_name,series_logo&status=eq.en_stock`, {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
    });
    if (!resp.ok) return;
    const rows = await resp.json();
    const seen = new Map();
    let count = 0;
    rows.forEach(c => {
      count++;
      if (c.series_id && !seen.has(c.series_id)) seen.set(c.series_id, { name: c.series_name || c.series_id, logo: c.series_logo });
    });
    const stockTemplate = siteSettings.sidebar_stock_text || 'Stock vérifié — {nombre} cartes\nmis à jour en temps réel';
    const stockHtml = escapeHtml(stockTemplate).replace(/\{nombre\}/g, `<b>${count}</b>`).split('\n').join('<br>');
    document.getElementById('sidebarFooter').innerHTML = stockHtml;

    const blockListEl = document.getElementById('blockList');
    let html = '';
    seen.forEach((info, id) => {
      const logoSrc = SERIES_LOGO_OVERRIDES[id] || (info.logo ? withExt(info.logo) : null);
      html += `<a class="nav-item" href="/?series=${encodeURIComponent(id)}">
        ${logoSrc ? `<img src="${escapeHtml(logoSrc)}" alt="">` : ''}${escapeHtml(info.name)}
      </a>`;
    });
    blockListEl.innerHTML = html;
  } catch (err) {}
}

document.getElementById('searchForm').addEventListener('submit', e => {
  e.preventDefault();
  const q = document.getElementById('search').value.trim();
  window.location.href = q ? `/?q=${encodeURIComponent(q)}` : '/';
});

function openMobileSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('open');
}
function closeMobileSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}
document.getElementById('mobileToggle').addEventListener('click', openMobileSidebar);
document.getElementById('sidebarClose').addEventListener('click', closeMobileSidebar);
document.getElementById('sidebarOverlay').addEventListener('click', closeMobileSidebar);

const searchToggleBtnEl = document.getElementById('searchToggleBtn');
if (searchToggleBtnEl) {
  searchToggleBtnEl.addEventListener('click', () => {
    document.querySelector('.search-field').classList.toggle('open');
  });
}

function renderAuthActions() {
  const el = document.getElementById('authActions');
  if (session && session.user) {
    const initial = (session.user.email || '?')[0].toUpperCase();
    el.innerHTML = `<div class="user-chip" id="logoutBtn"><div class="user-avatar">${initial}</div>${escapeHtml(session.user.email)}</div>`;
    document.getElementById('logoutBtn').addEventListener('click', logout);
  } else {
    el.innerHTML = `<button class="btn-ghost" id="loginBtn">Se connecter</button><button class="btn-primary" id="signupBtn">S'enregistrer</button>`;
    document.getElementById('loginBtn').addEventListener('click', () => openAuth('login'));
    document.getElementById('signupBtn').addEventListener('click', () => openAuth('signup'));
  }
}
let authMode = 'login';
function openAuth(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === mode));
  document.getElementById('authSubmit').textContent = mode === 'login' ? 'Se connecter' : 'Créer mon compte';
  document.getElementById('authMsg').textContent = '';
  document.getElementById('authOverlay').classList.add('open');
}
document.querySelectorAll('.auth-tab').forEach(tab => tab.addEventListener('click', () => openAuth(tab.dataset.tab)));
document.getElementById('authClose').addEventListener('click', () => document.getElementById('authOverlay').classList.remove('open'));
document.getElementById('authOverlay').addEventListener('click', e => { if (e.target.id === 'authOverlay') e.currentTarget.classList.remove('open'); });

document.getElementById('authSubmit').addEventListener('click', async () => {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const msgEl = document.getElementById('authMsg');
  msgEl.style.color = '';
  if (!email || !password) { msgEl.style.color = 'var(--danger)'; msgEl.textContent = 'Renseigne un email et un mot de passe.'; return; }
  msgEl.textContent = authMode === 'login' ? 'Connexion...' : 'Création du compte...';
  const endpoint = authMode === 'login' ? `${SUPABASE_URL}/auth/v1/token?grant_type=password` : `${SUPABASE_URL}/auth/v1/signup`;
  try {
    const resp = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json', apikey: SUPABASE_ANON_KEY }, body: JSON.stringify({ email, password }) });
    const data = await resp.json();
    if (!resp.ok) { msgEl.style.color = 'var(--danger)'; msgEl.textContent = data.error_description || data.msg || data.error || 'Une erreur est survenue.'; return; }
    if (data.access_token && data.user) {
      session = { access_token: data.access_token, user: data.user };
      localStorage.setItem('retrocarte_session', JSON.stringify(session));
      document.getElementById('authOverlay').classList.remove('open');
      renderAuthActions();
      showToast(authMode === 'login' ? 'Connecté !' : 'Compte créé, bienvenue !');
    } else {
      msgEl.style.color = 'var(--emerald-bright)';
      msgEl.textContent = 'Compte créé. Vérifie ta boîte mail pour confirmer, puis connecte-toi.';
    }
  } catch (err) { msgEl.style.color = 'var(--danger)'; msgEl.textContent = 'Erreur réseau : ' + err.message; }
});
async function logout() {
  try {
    if (session?.access_token) {
      await fetch(`${SUPABASE_URL}/auth/v1/logout`, { method: 'POST', headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${session.access_token}` } });
    }
  } catch (e) {}
  session = null;
  localStorage.removeItem('retrocarte_session');
  renderAuthActions();
  showToast('Déconnecté.');
}

function getPathSlugOrId() {
  const parts = window.location.pathname.split('/').filter(Boolean);
  const idx = parts.indexOf('carte-pokemon');
  if (idx !== -1 && parts[idx + 1]) return parts[idx + 1];
  return null;
}

async function loadCard() {
  const contentEl = document.getElementById('content');
  let slug = getParam('slug');
  let id = getParam('id');

  // Ancien lien avec ?slug=... -> on renvoie vers la vraie page statique /carte-pokemon/{slug}/
  if (slug) {
    window.location.replace(`/carte-pokemon/${encodeURIComponent(slug)}/`);
    return;
  }

  // Page statique générée : le slug (ou "id-xxx") est dans le chemin de l'URL, pas dans un ?paramètre
  if (!id) {
    const pathValue = getPathSlugOrId();
    if (pathValue) {
      if (pathValue.startsWith('id-')) id = pathValue.slice(3);
      else slug = pathValue;
    }
  }

  if (!slug && !id) {
    contentEl.innerHTML = '<div class="state">Aucune carte spécifiée.</div>';
    return;
  }

  const filter = slug ? `slug=eq.${encodeURIComponent(slug)}` : `id=eq.${encodeURIComponent(id)}`;

  try {
    const [cardResp, discountResp] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/cartes?${filter}&select=*&limit=1`, {
        headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
      }),
      fetch(`${SUPABASE_URL}/rest/v1/settings?key=eq.discount_percent&select=value`, {
        headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
      })
    ]);
    if (!cardResp.ok) throw new Error(await cardResp.text());
    const rows = await cardResp.json();

    if (rows.length === 0) {
      contentEl.innerHTML = '<div class="state">Cette carte n\'est plus disponible — elle a peut-être déjà été vendue, ou le lien est incorrect.</div>';
      return;
    }

    let discountPercent = 0;
    if (discountResp.ok) {
      const discountRows = await discountResp.json();
      if (discountRows.length > 0) discountPercent = parseInt(discountRows[0].value, 10) || 0;
    }

    renderCard(rows[0], discountPercent);
  } catch (err) {
    contentEl.innerHTML = `<div class="state">Erreur de chargement : ${escapeHtml(err.message)}</div>`;
  }
}

function renderCard(c, discountPercent) {
  const contentEl = document.getElementById('content');
  const numberSet = [c.card_number, c.set_name].filter(Boolean).join(' · ');

  const titleParts = [c.name, numberSet, c.condition].filter(Boolean);
  document.title = `${titleParts.join(' — ')} | Retrocarte`;
  const h1El = document.getElementById('pageH1');
  if (h1El) h1El.textContent = titleParts.join(' — ');

  let priceHtml, priceForEmail;
  if (c.price != null) {
    if (discountPercent > 0) {
      const discounted = c.price * (1 - discountPercent / 100);
      priceHtml = `<span class="price-original">${Number(c.price).toFixed(2)} €</span><span class="price-discounted">${discounted.toFixed(2)} €</span>`;
      priceForEmail = `${discounted.toFixed(2)} €`;
    } else {
      priceHtml = `${Number(c.price).toFixed(2)} €`;
      priceForEmail = priceHtml;
    }
  } else { priceHtml = 'Prix sur demande'; priceForEmail = priceHtml; }

  const badges = [
    c.first_edition ? '<span class="badge">1ère édition</span>' : '',
    c.stamp ? '<span class="badge">Stamp</span>' : '',
    c.holo ? '<span class="badge">Holo</span>' : '',
    (c.graded && c.grade != null) ? `<span class="badge">Gradée ${escapeHtml(String(c.grade))}</span>` : '',
    c.condition ? `<span class="badge cond">${rarityIcon(c.rarity)}${escapeHtml(c.condition)}</span>` : ''
  ].join('');

  const photos = [];
  if (c.photo_url) photos.push(`<div class="photo-frame" id="mainPhotoFrame"><img src="${escapeHtml(c.photo_url)}" alt="Recto"><div class="photo-label">Recto</div></div>`);
  if (c.photo_back_url) photos.push(`<div><img src="${escapeHtml(c.photo_back_url)}" alt="Verso"><div class="photo-label">Verso</div></div>`);
  if (photos.length === 0 && c.image_url) photos.push(`<div class="photo-frame" id="mainPhotoFrame"><img src="${escapeHtml(c.image_url)}" alt="${escapeHtml(c.name)}"><div class="photo-label">Illustration officielle</div></div>`);

  const isSoldOut = c.status === 'vendue';
  const inCart = cart.has(`carte:${c.id}`);
  const isRare = c.holo || c.graded || c.first_edition;

  contentEl.innerHTML = `
    <div class="card-panel ${isRare && !isSoldOut ? 'rare-halo' : ''}">
      <div class="photos">${photos.join('')}</div>
      <div class="info-col">
        <div class="badges">${badges}${isSoldOut ? '<span class="badge sold">Rupture de stock</span>' : ''}</div>
        <div class="meta">${escapeHtml(numberSet)}</div>
        ${c.series_name ? `
          <div class="series-row">
            ${(SERIES_LOGO_OVERRIDES[c.series_id] || (c.series_logo ? withExt(c.series_logo) : null)) ? `<img src="${escapeHtml(SERIES_LOGO_OVERRIDES[c.series_id] || withExt(c.series_logo))}" alt="">` : ''}
            <span>${escapeHtml(c.series_name)}</span>
          </div>
        ` : ''}
        <div class="price-block price mono">${priceHtml}</div>
        ${isSoldOut
          ? `<div class="cta cta-disabled">Indisponible — déjà vendue</div>`
          : `<button type="button" class="cta" id="cartToggleBtn" data-id="${escapeHtml(c.id)}">${inCart ? 'Retirer du panier' : 'Ajouter au panier'}</button>`}
      </div>
    </div>
  `;

  const mainFrame = document.getElementById('mainPhotoFrame');
  if (mainFrame) {
    mainFrame.insertAdjacentHTML('beforeend', '<div class="sweep-once"></div>');
  }

  if (!isSoldOut) {
    document.getElementById('cartToggleBtn').addEventListener('click', (e) => {
      const id = `carte:${c.id}`;
      if (cart.has(id)) { cart.delete(id); showToast('Retiré du panier'); }
      else { cart.add(id); burst(e.currentTarget); showToast('Hop, dans le sac !'); }
      saveCart();
      updateCartUI();
      renderCard(c, discountPercent);
    });
  }
}

renderAuthActions();
updateCartUI();
loadSiteSettings().then(loadBlocks);
loadCard();
</script>
