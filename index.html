<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boutique cartes Pokémon</title>
<style>
  :root {
    --ink: #1c1b19;
    --paper: #faf9f6;
    --card: #ffffff;
    --line: #dcd9d1;
    --accent: #2f5d4f;
    --accent-ink: #eaf2ef;
    --gold: #9c7a2e;
    --gold-bg: #fbf3df;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
  }
  header {
    padding: 40px 20px 24px;
    text-align: center;
    border-bottom: 1px solid var(--line);
    background: var(--card);
  }
  header h1 {
    font-size: 26px;
    font-weight: 800;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  header p {
    color: #6b6a64;
    font-size: 14px;
    margin: 0;
  }

  .controls {
    max-width: 1080px;
    margin: 24px auto 0;
    padding: 0 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .controls input, .controls select {
    padding: 10px 13px;
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 14px;
    background: var(--card);
    color: var(--ink);
  }
  .controls input[type="text"] { flex: 1; min-width: 200px; }
  .controls input:focus, .controls select:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }

  .grid {
    max-width: 1080px;
    margin: 24px auto 64px;
    padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 18px;
  }

  .series-filters {
    max-width: 1080px;
    margin: 14px auto 0;
    padding: 0 20px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .series-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--card);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--ink);
  }
  .series-chip img { height: 16px; width: auto; object-fit: contain; }
  .series-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .pagination {
    max-width: 1080px;
    margin: 8px auto 0;
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .pagination button {
    padding: 8px 14px;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .pagination button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
  .pagination .page-info { font-size: 13px; color: #6b6a64; }

  .ticket {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .ticket-img { aspect-ratio: 5 / 7; background: var(--paper); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; cursor: pointer; }
  .ticket-img img { width: 100%; height: 100%; object-fit: contain; }
  .watermark {
    position: absolute;
    right: 4%;
    bottom: 4%;
    width: 42%;
    pointer-events: none;
  }
  .watermark img {
    width: 100%;
    height: auto;
    display: block;
    opacity: 0.85;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.35));
  }
  .ticket-body {
    padding: 12px 14px 14px;
    position: relative;
  }
  .ticket-body::before {
    content: "";
    position: absolute;
    top: 0; left: 14px; right: 14px;
    border-top: 1px dashed var(--line);
  }
  .ticket-badges { margin: 10px 0 6px; display: flex; flex-wrap: wrap; gap: 4px; }
  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 999px;
    background: var(--gold-bg);
    color: var(--gold);
    letter-spacing: 0.02em;
  }
  .badge.cond { background: var(--accent-ink); color: var(--accent); }
  .ticket-name {
    font-size: 14px;
    font-weight: 700;
    line-height: 1.25;
    margin: 0 0 2px;
  }
  .ticket-meta {
    font-size: 11px;
    color: #8b897f;
    margin-bottom: 8px;
  }
  .ticket-price {
    font-size: 18px;
    font-weight: 800;
    color: var(--ink);
    margin-bottom: 10px;
  }
  .ticket-price .price-original {
    text-decoration: line-through;
    color: #8b897f;
    font-weight: 600;
    font-size: 14px;
    margin-right: 8px;
  }
  .ticket-price .price-discounted {
    color: var(--danger, #a3312d);
  }
  .ticket-cta {
    display: block;
    text-align: center;
    padding: 8px;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
  }
  .ticket-cta:hover { opacity: 0.9; }

  .empty, .loading {
    max-width: 1080px;
    margin: 60px auto;
    text-align: center;
    color: #8b897f;
    font-size: 14px;
    padding: 0 20px;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(28,27,25,0.6);
    z-index: 50;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 14px;
    max-width: 640px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 24px;
    position: relative;
  }
  .modal-close {
    position: absolute;
    top: 14px; right: 14px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 50%;
    width: 32px; height: 32px;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    color: var(--ink);
  }
  .modal-photos {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }
  .modal-photos img {
    flex: 1;
    width: 100%;
    max-height: 340px;
    object-fit: contain;
    border-radius: 8px;
    background: var(--paper);
    border: 1px solid var(--line);
  }
  .modal-photos .photo-label {
    font-size: 11px;
    color: #8b897f;
    text-align: center;
    margin-top: 4px;
  }
  .modal h2 { margin: 0 0 4px; font-size: 20px; }
  .modal .modal-meta { color: #6b6a64; font-size: 13px; margin-bottom: 12px; }
  .modal .modal-price { font-size: 24px; font-weight: 800; margin-bottom: 16px; }
</style>
</head>
<body>

<header>
  <h1>Boutique cartes Pokémon</h1>
  <p>Cartes vérifiées et notées à la main, mises à jour en temps réel.</p>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="Chercher une carte (nom, set...)">
  <select id="sort">
    <option value="recent">Plus récentes</option>
    <option value="price_asc">Prix croissant</option>
    <option value="price_desc">Prix décroissant</option>
    <option value="name">Nom (A → Z)</option>
  </select>
</div>

<div id="seriesFilters" class="series-filters"></div>

<div id="grid" class="grid"></div>
<div id="pagination" class="pagination"></div>
<div id="loading" class="loading">Chargement des cartes...</div>
<div id="empty" class="empty" style="display:none;">Aucune carte en stock pour le moment — reviens bientôt !</div>

let allCards = [];
let discountPercent = 0;

async function loadCards() {
  try {
    const [cardsResp, discountResp] = await Promise.all([
      fetch(
        `${SUPABASE_URL}/rest/v1/cartes?select=*&status=eq.en_stock&order=created_at.desc`,
        { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
      ),
      fetch(
        `${SUPABASE_URL}/rest/v1/settings?key=eq.discount_percent&select=value`,
        { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
      )
    ]);
    if (!cardsResp.ok) throw new Error(await cardsResp.text());
    allCards = await cardsResp.json();

    if (discountResp.ok) {
      const rows = await discountResp.json();
      if (rows.length > 0) discountPercent = parseInt(rows[0].value, 10) || 0;
    }

    document.getElementById('loading').style.display = 'none';
    render();
  } catch (err) {
    document.getElementById('loading').textContent = 'Erreur de chargement : ' + err.message;
  }
}

// Fusionne l'image officielle et le filigrane dans un vrai canvas, pour que le filigrane
// soit collé dans les pixels de l'image (impossible à retirer par un simple clic-droit "enregistrer").
function watermarkImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const logo = new Image();
      logo.onload = () => {
        try {
          const canvas = document.createElement('canvas');
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);

          // Logo en bas à droite, taille proportionnelle à l'image, légèrement transparent
          const logoW = canvas.width * 0.42;
          const logoH = logoW * (logo.naturalHeight / logo.naturalWidth);
          const pad = canvas.width * 0.04;
          ctx.globalAlpha = 0.85;
          ctx.drawImage(logo, canvas.width - logoW - pad, canvas.height - logoH - pad, logoW, logoH);
          ctx.globalAlpha = 1;

          resolve(canvas.toDataURL('image/png'));
        } catch (err) {
          reject(err);
        }
      };
      logo.onerror = reject;
      logo.src = WATERMARK_LOGO;
    };
    img.onerror = reject;
    img.src = url;
  });
}

function watermarkBlock() {
  return `<div class="watermark"><img src="${WATERMARK_LOGO}" alt=""></div>`;
}

let activeSeries = 'all';

function renderSeriesFilters() {
  const filtersEl = document.getElementById('seriesFilters');
  const seen = new Map();
  allCards.forEach(c => {
    if (c.series_id && !seen.has(c.series_id)) {
      seen.set(c.series_id, { name: c.series_name || c.series_id, logo: c.series_logo });
    }
  });

  if (seen.size === 0) {
    filtersEl.innerHTML = '';
    return;
  }

  let html = `<div class="series-chip ${activeSeries === 'all' ? 'active' : ''}" data-series="all">Tous les blocs</div>`;
  seen.forEach((info, id) => {
    const logoSrc = SERIES_LOGO_OVERRIDES[id] || (info.logo ? withExt(info.logo) : null);
    html += `<div class="series-chip ${activeSeries === id ? 'active' : ''}" data-series="${escapeHtml(id)}">
      ${logoSrc ? `<img src="${escapeHtml(logoSrc)}" alt="">` : ''}${escapeHtml(info.name)}
    </div>`;
  });
  filtersEl.innerHTML = html;

  filtersEl.querySelectorAll('.series-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      activeSeries = chip.dataset.series;
      currentPage = 1;
      render();
    });
  });
}

const PAGE_SIZE = 10;
let currentPage = 1;

function render() {
  renderSeriesFilters();

  const query = document.getElementById('search').value.trim().toLowerCase();
  const sort = document.getElementById('sort').value;

  let cards = allCards.filter(c =>
    (!query ||
      (c.name || '').toLowerCase().includes(query) ||
      (c.set_name || '').toLowerCase().includes(query)) &&
    (activeSeries === 'all' || c.series_id === activeSeries)
  );

  if (sort === 'price_asc') cards.sort((a, b) => (a.price || 0) - (b.price || 0));
  else if (sort === 'price_desc') cards.sort((a, b) => (b.price || 0) - (a.price || 0));
  else if (sort === 'name') cards.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
  // 'recent' garde l'ordre déjà trié par created_at desc côté requête

  const gridEl = document.getElementById('grid');
  const emptyEl = document.getElementById('empty');

  if (cards.length === 0) {
    gridEl.innerHTML = '';
    emptyEl.style.display = 'block';
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  emptyEl.style.display = 'none';

  const totalPages = Math.max(1, Math.ceil(cards.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  const pageCards = cards.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

  gridEl.innerHTML = pageCards.map((c, i) => {
    const badges = [
      c.first_edition ? '<span class="badge">1ère édition</span>' : '',
      c.stamp ? '<span class="badge">Stamp</span>' : '',
      c.holo ? '<span class="badge">Holo</span>' : '',
      c.condition ? `<span class="badge cond">${escapeHtml(c.condition)}</span>` : ''
    ].join('');

    let priceText;
    let priceForEmail;
    if (c.price != null) {
      if (discountPercent > 0) {
        const discounted = c.price * (1 - discountPercent / 100);
        priceText = `<span class="price-original">${Number(c.price).toFixed(2)} €</span><span class="price-discounted">${discounted.toFixed(2)} €</span>`;
        priceForEmail = `${discounted.toFixed(2)} €`;
      } else {
        priceText = `${Number(c.price).toFixed(2)} €`;
        priceForEmail = priceText;
      }
    } else {
      priceText = 'Prix sur demande';
      priceForEmail = priceText;
    }
    const numberSet = [c.card_number, c.set_name].filter(Boolean).join(' · ');
    const subject = encodeURIComponent(`Réservation carte : ${c.name}`);
    const body = encodeURIComponent(`Bonjour, je souhaite réserver la carte "${c.name}" (${numberSet}) à ${priceForEmail}.`);
    const productUrl = c.slug
      ? `/carte-pokemon/?slug=${encodeURIComponent(c.slug)}`
      : `/carte-pokemon/?id=${encodeURIComponent(c.id)}`;

    return `
      <div class="ticket" data-product-url="${escapeHtml(productUrl)}" style="cursor:pointer;">
        <div class="ticket-img" data-index="${i}">
          ${c.image_url ? `<img src="${escapeHtml(c.image_url)}" alt="${escapeHtml(c.name)}" loading="lazy">` : ''}
          ${watermarkBlock()}
        </div>
        <div class="ticket-body">
          <div class="ticket-badges">${badges}</div>
          <div class="ticket-name">${escapeHtml(c.name)}</div>
          <div class="ticket-meta">${escapeHtml(numberSet)}</div>
          <div class="ticket-price">${priceText}</div>
          <a class="ticket-cta" href="mailto:${CONTACT_EMAIL}?subject=${subject}&body=${body}">Réserver</a>
        </div>
      </div>
    `;
  }).join('');

  gridEl.querySelectorAll('.ticket').forEach(el => {
    el.addEventListener('click', (e) => {
      // Le bouton "Réserver" garde son propre comportement (mailto), pas de redirection dans ce cas
      if (e.target.closest('.ticket-cta')) return;
      window.location.href = el.dataset.productUrl;
    });
  });

  gridEl.querySelectorAll('.ticket-img').forEach(el => {
    const card = pageCards[Number(el.dataset.index)];
    const imgEl = el.querySelector('img');
    if (card.image_url && imgEl) {
      watermarkImage(card.image_url)
        .then(dataUrl => {
          imgEl.src = dataUrl;
          // Le filigrane est maintenant dans les pixels : on retire la couche CSS, devenue redondante
          const overlay = el.querySelector('.watermark');
          if (overlay) overlay.remove();
        })
        .catch(err => {
          // Repli : l'image brute reste affichée avec seulement le filigrane CSS par-dessus
          console.warn('Filigrane non fusionné (probablement CORS) :', err);
        });
    }
  });

  renderPagination(totalPages, cards.length);
}

function renderPagination(totalPages, totalCount) {
  const paginationEl = document.getElementById('pagination');
  if (totalPages <= 1) {
    paginationEl.innerHTML = '';
    return;
  }
  paginationEl.innerHTML = `
    <button class="ghost" id="pagePrev" ${currentPage <= 1 ? 'disabled' : ''}>← Précédent</button>
    <span class="page-info">Page ${currentPage} / ${totalPages} (${totalCount} carte${totalCount > 1 ? 's' : ''})</span>
    <button class="ghost" id="pageNext" ${currentPage >= totalPages ? 'disabled' : ''}>Suivant →</button>
  `;
  document.getElementById('pagePrev')?.addEventListener('click', () => { currentPage--; render(); window.scrollTo({top:0, behavior:'smooth'}); });
  document.getElementById('pageNext')?.addEventListener('click', () => { currentPage++; render(); window.scrollTo({top:0, behavior:'smooth'}); });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

// Filet de sécurité : TCGdex ne renvoie jamais d'extension sur ses URLs d'images
function withExt(url) {
  if (!url) return url;
  return /\.(png|webp|jpe?g)$/i.test(url) ? url : `${url}.png`;
}

document.getElementById('search').addEventListener('input', () => { currentPage = 1; render(); });
document.getElementById('sort').addEventListener('change', () => { currentPage = 1; render(); });

loadCards();
</script>
</body>
</html>
